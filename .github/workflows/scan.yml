name: Nightly Job Scan

on:
#  schedule:
#    # Runs at 21:00 UTC (2:30 AM Indian Standard Time) every day
#    - cron: '0 21 * * *'
  workflow_dispatch: # Allows you to run the scan manually from the GitHub website

permissions:
  contents: write # Allows the action to commit state files back to your repo

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        persist-credentials: true

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install .

    - name: Create config.json
      run: |
        echo '{
          "tinyfish_api_key": "${{ secrets.TINYFISH_API_KEY }}",
          "llm_provider": "openrouter",
          "openrouter_api_key": "${{ secrets.OPENROUTER_API_KEY }}",
          "openrouter_model": "meta-llama/llama-3.3-70b-instruct:free",
          "openrouter_fallback_models": [
            "nvidia/nemotron-3-super-120b-a12b:free",
            "google/gemma-4-31b-it:free",
            "qwen/qwen3-coder:free"
          ],
          "gemini_api_key": "${{ secrets.GEMINI_API_KEY }}",
          "gemini_model": "gemini-1.5-flash",
          "candidate": {
            "name": "Rahul Maurya",
            "resume_path": "resume/Rahul_Maurya_Resume.md",
            "profile": "12+ YOE, Program Manager. Stack: Program & Project Management, Agile (Scrum/Kanban), Generative AI & Automation (LLMs, prompt engineering, workflow automation), Compliance (ISO 27001, SOC2), Data Analytics (SQL, Tableau, Power BI), AWS",
            "seeking": "Program Manager, Technical Program Manager, Agile Coach, Scrum Master. Remote-friendly, Bengaluru/Bangalore or Hyderabad, or relocation (with visa sponsorship) to EU / NA / APAC / Middle East / Singapore",
            "not_suitable": "Junior roles, entry-level, non-technical/non-IT roles, pure hands-on software development roles without project/program management responsibilities",
            "relocation_note": "Currently located in Bengaluru, Karnataka, India. Seeking local jobs in Bengaluru or Hyderabad, remote roles, or global relocation with visa sponsorship.",
            "min_score": 60,
            "top_n": 5,
            "auto_draft_top_n": 3
          }
        }' > config.json

    - name: Run Job Scan
      env:
        TINYFISH_API_KEY: ${{ secrets.TINYFISH_API_KEY }}
        OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        CANDIDATE_NAME: "Rahul Maurya"
        RESUME_PATH: "resume/Rahul_Maurya_Resume.md"
        MIN_SCORE: 60
        TOP_N: 5
        AUTO_DRAFT_TOP_N: 3
      run: python -m job_hunt.main scan

    - name: Commit and push updated state and CSV results
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add state/seen_jobs.json state/last_scan.json state/job_history.json output/ || true
        git commit -m "Auto-update job scan state and CSV [skip ci]" || echo "No changes to commit"
        git push || echo "No changes to push"
