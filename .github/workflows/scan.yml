name: Nightly Job Scan

on:
  schedule:
    # Runs at 21:00 UTC (2:30 AM Indian Standard Time) every day
    - cron: '0 21 * * *'
  workflow_dispatch: # Allows you to run the scan manually from the GitHub website

permissions:
  contents: write # Allows the action to commit state files back to your repo

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        persist-credentials: true

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install .

    - name: Run Job Scan
      env:
        TINYFISH_API_KEY: ${{ secrets.TINYFISH_API_KEY }}
        OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        CANDIDATE_NAME: "Rahul Maurya"
        RESUME_PATH: "resume/Rahul_Maurya_Resume.md"
        MIN_SCORE: 60
        TOP_N: 5
      run: python -m job_hunt.main scan

    - name: Commit and push updated state and CSV results
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add state/seen_jobs.json state/last_scan.json state/job_history.json output/ || true
        git commit -m "Auto-update job scan state and CSV [skip ci]" || echo "No changes to commit"
        git push || echo "No changes to push"
